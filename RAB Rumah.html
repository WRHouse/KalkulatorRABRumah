<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RAB Rumah — Kalkulator AHSP 2025</title>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.3/dist/chart.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script src="rab-data.js"></script>
<script type="text/babel" src="tweaks-panel.jsx"></script>
<script type="text/babel" src="rab-input.jsx"></script>
<script type="text/babel" src="rab-gambar.jsx"></script>
<script type="text/babel" src="rab-hasil.jsx"></script>

<style>
@import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap');
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --navy:#0F1F3D;--navy2:#1A3260;--accent:#E07B28;--accent2:#F5A65B;
  --green:#166534;--green-bg:#DCFCE7;--blue:#1D4ED8;--blue-bg:#DBEAFE;
  --gray0:#F8FAFC;--gray1:#F1F5F9;--gray2:#E2E8F0;--gray3:#CBD5E1;
  --gray4:#94A3B8;--gray5:#64748B;--gray6:#475569;--gray7:#334155;--gray8:#1E293B;
  --white:#FFFFFF;--radius:10px;--shadow:0 2px 12px rgba(15,31,61,.10);
  --font:'Plus Jakarta Sans',sans-serif;
}
html,body{min-height:100vh;background:var(--gray0);font-family:var(--font);color:var(--gray8)}
.app-shell{display:flex;flex-direction:column;min-height:100vh}
.topbar{background:var(--navy);color:white;display:flex;align-items:center;justify-content:space-between;
  padding:0 28px;height:60px;box-shadow:0 2px 8px rgba(0,0,0,.25);position:sticky;top:0;z-index:100}
.topbar-brand{display:flex;align-items:center;gap:10px}
.topbar-logo{width:32px;height:32px;background:var(--accent);border-radius:7px;
  display:flex;align-items:center;justify-content:center;font-size:17px}
.topbar-title{font-size:17px;font-weight:700;letter-spacing:-.3px}
.topbar-sub{font-size:11px;color:rgba(255,255,255,.45);margin-top:1px}
.tab-bar{display:flex;background:var(--navy2);gap:0;padding:0 20px;overflow-x:auto;flex-shrink:0}
.tab-btn{padding:12px 16px;font-size:13px;font-weight:600;color:rgba(255,255,255,.5);border:none;
  background:transparent;cursor:pointer;border-bottom:3px solid transparent;transition:all .2s;
  display:flex;align-items:center;gap:6px;white-space:nowrap;flex-shrink:0}
.tab-btn:hover{color:rgba(255,255,255,.8)}
.tab-btn.active{color:white;border-bottom-color:var(--accent)}
.main-content{flex:1;max-width:1280px;width:100%;margin:0 auto;padding:28px 24px 80px}

/* Cards */
.card{background:white;border-radius:var(--radius);box-shadow:var(--shadow);padding:24px}
.card-title{font-size:15px;font-weight:700;color:var(--gray8);margin-bottom:16px;display:flex;align-items:center;gap:8px}
.section-title{font-size:12px;font-weight:700;color:var(--navy);text-transform:uppercase;letter-spacing:.8px;margin-bottom:10px;padding-bottom:7px;border-bottom:2px solid var(--gray2)}

/* Form */
.form-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(210px,1fr));gap:14px}
.form-group{display:flex;flex-direction:column;gap:5px}
label{font-size:12px;font-weight:600;color:var(--gray6);letter-spacing:.3px}
input[type=text],input[type=number],select,textarea{width:100%;padding:9px 12px;border:1.5px solid var(--gray2);border-radius:8px;font-family:var(--font);font-size:14px;color:var(--gray8);background:white;transition:border-color .15s,box-shadow .15s;outline:none}
input:focus,select:focus,textarea:focus{border-color:var(--navy);box-shadow:0 0 0 3px rgba(15,31,61,.08)}
.input-with-unit{position:relative}.input-with-unit input{padding-right:44px}
.input-unit{position:absolute;right:10px;top:50%;transform:translateY(-50%);font-size:12px;color:var(--gray4);font-weight:700}

/* Class cards */
.class-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}
.class-card{border:2px solid var(--gray2);border-radius:10px;padding:14px;cursor:pointer;transition:all .15s;background:white}
.class-card:hover{border-color:var(--gray4)}
.class-card.selected{border-color:var(--accent);background:#FFF7ED}
.cc-badge{display:inline-block;font-size:10px;font-weight:700;letter-spacing:.8px;padding:2px 8px;border-radius:20px;margin-bottom:7px}
.cc-name{font-size:14px;font-weight:700}.cc-range{font-size:11px;color:var(--gray5);margin-top:2px}
.cc-price{font-size:12px;font-weight:600;color:var(--accent);margin-top:6px}

/* Summary cards */
.summary-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:20px}
.sum-card{background:white;border-radius:var(--radius);box-shadow:var(--shadow);padding:18px}
.sum-card .sc-label{font-size:10px;font-weight:600;color:var(--gray5);letter-spacing:.5px;text-transform:uppercase}
.sum-card .sc-value{font-size:20px;font-weight:800;color:var(--gray8);margin:5px 0 2px;letter-spacing:-.8px;line-height:1.1}
.sum-card .sc-value.accent{color:var(--accent)}.sum-card .sc-value.navy{color:var(--navy)}
.sum-card .sc-sub{font-size:10px;color:var(--gray4)}
.sum-card .sc-icon{width:32px;height:32px;border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:16px;margin-bottom:10px}

/* Table */
.rab-table{width:100%;border-collapse:collapse;font-size:13px}
.rab-table th{background:var(--navy);color:white;padding:10px 13px;text-align:left;font-size:11px;font-weight:700;letter-spacing:.5px}
.rab-table th.tar,.rab-table td.tar{text-align:right}
.rab-table td{padding:8px 13px;border-bottom:1px solid var(--gray1);vertical-align:middle}
.rab-table tr:hover td{background:var(--gray0)}
.rab-table .cat-header td{background:var(--gray1);font-weight:700;font-size:12px;cursor:pointer}
.rab-table .subtotal-row td{background:#F0F4FF;font-weight:600;color:var(--navy);border-top:2px solid var(--gray3)}
.rab-table .total-row td{background:var(--navy);color:white;font-weight:700;font-size:14px}

/* Charts */
.chart-grid{display:grid;grid-template-columns:1fr 1fr;gap:18px}
.legend-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:7px;margin-top:12px}
.legend-item{display:flex;align-items:center;gap:7px;font-size:11px;color:var(--gray6)}
.legend-dot{width:9px;height:9px;border-radius:2px;flex-shrink:0}

/* Compare */
.compare-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}
.compare-col{background:white;border-radius:var(--radius);box-shadow:var(--shadow);overflow:hidden}
.compare-header{padding:14px 16px;color:white}
.compare-header h3{font-size:14px;font-weight:700}
.compare-body{padding:14px}
.compare-row{display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:1px solid var(--gray1)}
.compare-row:last-child{border-bottom:none}
.compare-total{background:var(--gray0);padding:12px 14px;border-top:2px solid var(--gray2)}

/* Step bar */
.step-bar{display:flex;align-items:center;margin-bottom:24px}
.step-item{display:flex;align-items:center;gap:8px}
.step-circle{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:800;flex-shrink:0}
.step-circle.done{background:var(--navy);color:white}
.step-circle.active{background:var(--accent);color:white;box-shadow:0 0 0 4px rgba(224,123,40,.2)}
.step-circle.todo{background:var(--gray2);color:var(--gray5)}
.step-label{font-size:12px;font-weight:600;color:var(--gray6)}
.step-label.active{color:var(--accent)}
.step-sep{flex:1;height:2px;background:var(--gray2);margin:0 8px;min-width:16px}
.step-sep.done{background:var(--navy)}

/* Buttons */
.btn{display:inline-flex;align-items:center;gap:7px;padding:9px 18px;border-radius:8px;font-size:13px;font-weight:700;border:none;cursor:pointer;transition:all .15s;font-family:var(--font)}
.btn-primary{background:var(--accent);color:white}.btn-primary:hover{background:#C96B1A;transform:translateY(-1px);box-shadow:0 4px 14px rgba(224,123,40,.35)}
.btn-primary:disabled{background:var(--gray3);color:var(--gray4);cursor:not-allowed;transform:none;box-shadow:none}
.btn-navy{background:var(--navy);color:white}.btn-navy:hover{background:var(--navy2)}
.btn-outline{background:white;color:var(--gray7);border:1.5px solid var(--gray3)}.btn-outline:hover{border-color:var(--gray5)}
.btn-green{background:#16A34A;color:white}.btn-green:hover{background:#15803D}
.btn-sm{padding:6px 12px;font-size:12px}

/* Upload zone */
.upload-zone{border:2.5px dashed var(--gray3);border-radius:12px;text-align:center;cursor:pointer;transition:all .2s;background:var(--gray0)}
.upload-zone:hover,.upload-zone.drag{border-color:var(--accent);background:#FFF7ED}
.uz-icon{font-size:44px;margin-bottom:10px}
.uz-title{font-size:15px;font-weight:700;color:var(--gray7)}
.uz-sub{font-size:11px;color:var(--gray4);margin-top:5px}

/* AI result */
.ai-result-box{background:white;border:1.5px solid var(--gray2);border-radius:10px;overflow:hidden}
.ai-result-header{background:var(--navy);color:white;padding:12px 16px;font-size:13px;font-weight:700;display:flex;align-items:center;gap:8px}
.ai-result-body{padding:16px}
.ai-field-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-bottom:14px}
.ai-field{background:var(--gray0);border-radius:7px;padding:10px}
.ai-field label{font-size:10px;font-weight:700;color:var(--gray4);text-transform:uppercase;letter-spacing:.5px}
.ai-field .af-val{font-size:17px;font-weight:800;color:var(--gray8);margin-top:3px}
.ai-apply-row{display:flex;gap:10px;align-items:center;padding-top:12px;border-top:1px solid var(--gray2)}
.ai-streaming{font-size:12px;color:var(--gray7);line-height:1.7;white-space:pre-wrap;background:var(--gray0);border-radius:7px;padding:14px;max-height:360px;overflow-y:auto;font-family:monospace}

/* Misc */
.divider{height:1px;background:var(--gray2);margin:18px 0}
.flex-row{display:flex;align-items:center;gap:10px}.flex-row.spread{justify-content:space-between}
.chip{display:inline-block;font-size:11px;font-weight:600;padding:2px 8px;border-radius:20px}
.info-box{background:#EFF6FF;border-left:3px solid #3B82F6;padding:11px 13px;border-radius:0 8px 8px 0;font-size:12px;color:#1E40AF;line-height:1.6}
.warn-box{background:#FFFBEB;border-left:3px solid #F59E0B;padding:11px 13px;border-radius:0 8px 8px 0;font-size:12px;color:#92400E;line-height:1.6}
.success-box{background:#F0FDF4;border-left:3px solid #22C55E;padding:11px 13px;border-radius:0 8px 8px 0;font-size:12px;color:#166534;line-height:1.6}

/* Typing dots */
.typing-dots span{display:inline-block;width:6px;height:6px;border-radius:50%;background:var(--accent);animation:blink 1.2s infinite}
.typing-dots span:nth-child(2){animation-delay:.2s}.typing-dots span:nth-child(3){animation-delay:.4s}
@keyframes blink{0%,80%,100%{opacity:.2}40%{opacity:1}}

/* Utility */
.mt4{margin-top:4px}.mt8{margin-top:8px}.mt12{margin-top:12px}.mt16{margin-top:16px}
.mt20{margin-top:20px}.mt24{margin-top:24px}.mb8{margin-bottom:8px}.mb16{margin-bottom:16px}.mb20{margin-bottom:20px}
.text-right{text-align:right}.text-center{text-align:center}
.text-sm{font-size:12px}.text-xs{font-size:11px}.text-muted{color:var(--gray4)}
.text-accent{color:var(--accent)}.text-navy{color:var(--navy)}.font-bold{font-weight:700}
.gap8{gap:8px}.gap12{gap:12px}.gap16{gap:16px}

/* Print */
@media print{
  .topbar,.tab-bar,.no-print{display:none!important}
  .main-content{max-width:100%;padding:0}
  body{background:white}
  .card,.sum-card,.compare-col{box-shadow:none;border:1px solid var(--gray2)}
  @page{margin:18mm}
}

/* Responsive */
@media(max-width:900px){
  .summary-grid{grid-template-columns:repeat(2,1fr)}
  .class-grid,.compare-grid{grid-template-columns:1fr}
  .chart-grid{grid-template-columns:1fr}
  .topbar{padding:0 14px}
  .main-content{padding:16px 12px 60px}
}
@media(max-width:600px){
  .ai-field-grid{grid-template-columns:1fr}
  .tab-btn{padding:10px 12px;font-size:12px}
}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useCallback } = React;

const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "showGambar": true,
  "showCompare": true,
  "defaultKelas": "menengah",
  "defaultGaya": "modern_minimalis",
  "defaultAtap": "genteng_metal"
}/*EDITMODE-END*/;

function App() {
  const [tab, setTab] = useState('input');
  const [result, setResult] = useState(null);
  const [tweaks, setTweak] = useTweaks(TWEAK_DEFAULTS);

  const [input, setInput] = useState({
    namaProyek:'', panjang:'', lebar:'', luas:'', lantai:1,
    kamarTidur:3, kamarMandi:2,
    kelas: tweaks?.defaultKelas || 'menengah',
    gaya:  tweaks?.defaultGaya  || 'modern_minimalis',
    atap:  tweaks?.defaultAtap  || 'genteng_metal',
    wilayahId:'jabodetabek', tahun:'2025', metode:'kontraktor',
    ohp: 10, catatan:'',
  });

  const handleCalc = useCallback(() => {
    const r = calcRABDetail(input);
    setResult(r);
    setTab('hasil');
  }, [input]);

  const handleOhpChange = (val) => setInput(p => ({ ...p, ohp: val }));

  const TABS = [
    { id:'input',   label:'📋 Input Data' },
    { id:'gambar',  label:'🗺 Gambar Kerja',   show: tweaks?.showGambar !== false },
    { id:'hasil',   label:'📊 Hasil RAB' },
    { id:'compare', label:'⚖️ Perbandingan',   show: tweaks?.showCompare !== false },
  ].filter(t => t.show !== false);

  return (
    <div className="app-shell">
      <div className="topbar">
        <div className="topbar-brand">
          <div className="topbar-logo">🏠</div>
          <div>
            <div className="topbar-title">RAB Rumah</div>
            <div className="topbar-sub">AHSP 2025 · Permen PUPR No.1/2022 · SNI 03-2847-2019</div>
          </div>
        </div>
        {result && (
          <div className="no-print" style={{display:'flex',gap:8,alignItems:'center'}}>
            <span style={{fontSize:11,color:'rgba(255,255,255,.45)'}}>Estimasi:</span>
            <span style={{fontSize:14,fontWeight:800,color:'var(--accent2)'}}>
              {new Intl.NumberFormat('id-ID',{style:'currency',currency:'IDR',maximumFractionDigits:0}).format(result.grandTotal*(1+((input.ohp||10)/100)))}
            </span>
          </div>
        )}
      </div>

      <div className="tab-bar no-print">
        {TABS.map(t => (
          <button key={t.id} className={`tab-btn ${tab===t.id?'active':''}`} onClick={()=>setTab(t.id)}>
            {t.label}
          </button>
        ))}
      </div>

      <div className="main-content">
        {tab==='input'   && <InputTab     input={input} setInput={setInput} onCalc={handleCalc}/>}
        {tab==='gambar'  && <GambarKerjaTab input={input} setInput={setInput} onApply={()=>setTab('input')}/>}
        {tab==='hasil'   && <ResultsTab   result={result} input={input} onOhpChange={handleOhpChange}/>}
        {tab==='compare' && <CompareTab   input={input}/>}
      </div>

      <TweaksPanel>
        <TweakSection title="Tab Aktif">
          <TweakToggle id="showGambar"  label="Tab Gambar Kerja"/>
          <TweakToggle id="showCompare" label="Tab Perbandingan"/>
        </TweakSection>
        <TweakSection title="Default Input">
          <TweakRadio id="defaultKelas" label="Kelas"  options={['ekonomi','menengah','mewah']}/>
          <TweakSelect id="defaultGaya" label="Gaya"
            options={GAYA_ARSITEKTUR.map(g=>({value:g.id,label:g.label}))}/>
          <TweakSelect id="defaultAtap" label="Atap"
            options={JENIS_ATAP.map(a=>({value:a.id,label:a.label}))}/>
        </TweakSection>
      </TweaksPanel>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>

<template id="__bundler_thumbnail" data-bg-color="#0F1F3D">
  <svg viewBox="0 0 120 80" xmlns="http://www.w3.org/2000/svg">
    <rect width="120" height="80" fill="#0F1F3D"/>
    <polygon points="60,10 90,35 85,35 85,65 35,65 35,35 30,35" fill="#E07B28"/>
    <rect x="50" y="45" width="20" height="20" fill="#1A3260" rx="2"/>
    <rect x="12" y="50" width="8" height="12" fill="#E07B28" rx="1" opacity=".8"/>
    <rect x="22" y="42" width="8" height="20" fill="#E07B28" rx="1"/>
    <rect x="32" y="36" width="8" height="26" fill="#E07B28" rx="1"/>
    <text x="60" y="76" font-family="sans-serif" font-size="5" fill="rgba(255,255,255,.4)" text-anchor="middle">RAB RUMAH · AHSP 2025</text>
  </svg>
</template>
</body>
</html>
